apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web

      containers:
        - name: calibre-web
          image: lscr.io/linuxserver/calibre-web:0.6.26

          envFrom:
            PUID: 1000
            PGID: 1000

          ports:
            - containerPort: 8083

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - mountPath: "/calibre-web/data/config"
              name: calibre-web-data
            - mountPath: "/books"
              name: calibre-web-books
      volumes:
        - name: calibre-web-data
          persistentVolumeClaim:
            claimName: calibre-web-data-pvc
        - name: calibre-web-books
          persistentVolumeClaim:
            claimName: calibre-web-books
