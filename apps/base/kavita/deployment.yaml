apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kavita
  template:
    metadata:
      labels:
        app: kavita
    spec:
      securityContext:
        fsGroup: 33
        runAsUser: 33
        runAsGroup: 33

      containers:
        - name: kavita
          image: jvmilazz0/kavita:0.9.0.2
          ports:
            - containerPort: 5000

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - mountPath: "/kavita/config"
              name: kavita-data
            - mountPath: "/books"
              name: kavita-books
      volumes:
        - name: kavita-data
          persistentVolumeClaim:
            claimName: kavita-data-pvc
        - name: kavita-books
          hostPath:
            path: /mnt/media/books
            type: DirectoryOrCreate
